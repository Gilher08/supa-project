
<mat-sidenav-container class="container">
  <mat-sidenav #drawer mode="over">
    <mat-nav-list>
      <a mat-list-item routerLink="/home" (click)="drawer.close()">
        <mat-icon>home</mat-icon>
        <span style="margin-left: 20px; font-size: 20px;">Accueil</span>
      </a>
      <a mat-list-item routerLink="/taches" (click)="drawer.close()">
        <mat-icon>task</mat-icon>
        <span style="margin-left: 20px; font-size: 20px;">Mes Tâches</span>
      </a>
      <a mat-list-item routerLink="/parametres" (click)="drawer.close()">
        <mat-icon>settings</mat-icon>
        <span style="margin-left: 20px; font-size: 20px;">Paramètres</span>
      </a>
      <a mat-list-item (click)="drawer.close()">
        <mat-icon>close</mat-icon>
        <span style="margin-left: 20px; font-size: 20px;">Fermer</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar class="header">
      <button
        mat-icon-button
        (click)="drawer.toggle()">
        <mat-icon style="color: white">menu</mat-icon>
      </button>
      <span class="titre">
        Gilher Application
      </span>
      <span class="spacer"></span>
      <img src="/favicon-v2.png" alt="Logo" class="logo">
    </mat-toolbar>
    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
