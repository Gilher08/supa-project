
<mat-toolbar class="header">
<span class="spacer"></span>
  <span>Mes tâches à la retraite</span>
  <span class="spacer"></span>
</mat-toolbar>
<div class="content">
  <div class="cards-container">
    @for (tache of taches; track tache.id) {
      <mat-card class="tache-card">
        <mat-card-title (click)="consulterTache(tache)">{{ tache.titre }}</mat-card-title>
        <mat-card-subtitle>Créé le {{ tache.created_at | date:'dd/MM/yyyy' }}</mat-card-subtitle>
        <mat-card-actions class="action-card">
            <button mat-button (click)="modifierTache(tache)">
            Modifier
            <mat-icon>edit</mat-icon>
          </button>
          <button matButton (click)="supprimerTache(tache)">
            Supprimer
            <mat-icon>delete</mat-icon>
          </button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>

<button mat-fab color="warn" class="fab" (click)="ajouterTache()">
  <mat-icon>add</mat-icon>
</button>
