<h2 mat-dialog-title>Confirmation</h2>

<mat-dialog-content>
  <p>{{ message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="annuler()">
    Annuler
    <mat-icon>cancel</mat-icon>
  </button>

  <button mat-raised-button color="warn" (click)="confirmer()">
    Supprimer
    <mat-icon>delete</mat-icon>
  </button>
</mat-dialog-actions>
